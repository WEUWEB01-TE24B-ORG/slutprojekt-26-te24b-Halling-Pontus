<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="./script.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <nav>
                <a href="index.html">Hem</a>
                <a href="blogg.html">Blogg</a>
                <a class="active" href="kontakta.html">Kontakta</a>
            </nav>
        </header>
        <main>
            <div class="suportPage">
                <h1>Kontakt metoder:</h1>
                <div class="columns">
                    <figure>
                        <img src="pictures/letterIcon.webp" alt="Letter icon">
                        <p>Email: <a href="mailto:">pontus@gmail.yahoo.se</a></p>
                        <p>Väntetid: 1-3 arbetsdagar</p>
                    </figure>
                    <figure>
                        <img src="pictures/phoneIcon.webp" alt="Phone icon">
                        <p>Tel: <a href="tel:+">+4676-304 32 91</a></p>
                        <p>Vardag: 18:00-01:00</p>
                        <p class="time"></p>
                    </figure>
                </div>
                <div class="suportForm">
                    <h2>Lämna en kommentar:</h2>
                    <form method="post">
                        <label for="Name">Name:</label><br>
                        <input type="nameText"><br>
                        <label for="email">Email:</label><br>
                        <input type="emailText"><br>
                        <label for="reEmail">Reenter email:</label><br>
                        <input type="reEmailText"><br>
                        <label for="suport">Your problem:</label><br>
                        <textarea name="suportText"></textarea><br>
                    </form>
                </div>
            </div>
        </main>
    </div>
    </div>
</body>

</html>
