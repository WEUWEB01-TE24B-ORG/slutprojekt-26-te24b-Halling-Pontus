<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="./script.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <nav>
                <a href="index.html">Hem</a>
                <a href="blogg.html">Blogg</a>
                <a class="active" href="kontakta.html">Kontakta</a>
            </nav>
        </header>
        <main>
            <article>
                <h1>Kontakt metoder:</h1>
                <div class="columns">
                    <figure>
                        <img src="pictures/letterIcon.webp" alt="Letter icon">
                        <p>Email: <a href="mailto:">pontus@gmail.yahoo.se</a></p>
                        <p>Väntetid: 1-3 arbetsdagar</p>
                    </figure>
                    <figure>
                        <img src="pictures/phoneIcon.webp" alt="Phone icon">
                        <p>Tel: <a href="tel:+">+4676-304 32 91</a></p>
                        <p>Vardag: 18:00-01:00</p>
                        <p class="time"></p>
                    </figure>
                </div>
                <div class="suport-form">
                    <h2>kontakt form</h2>
                    <form method="post">
                        <label for="name">Name:</label><br>
                        <input type="text" id="name" name="name"><br>
                        <label for="email">Email:</label><br>
                        <input type="email" id="email" name="email"><br>
                        <label for="reEmail">Reenter email:</label><br>
                        <input type="email" id="reEmail" name="reEmail"><br>
                        <label for="support">Your problem:</label><br>
                        <textarea id="support" name="supportText"></textarea><br>
                    </form>
                </div>
            </article>
        </main>
        <footer>
            <p>PO&copy;</p>
            <p><a href="https://kattmys.se/">kattmys.se</a></p>
        </footer>
    </div>

</body>

</html>
